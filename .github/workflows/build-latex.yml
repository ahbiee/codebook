name: Build LaTeX PDF

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        env:
          # 【最關鍵】強制 Python 使用 UTF-8，防止讀取中文註解時崩潰
          PYTHONIOENCODING: utf8 
        with:
          root_file: main.tex 
          compiler: xelatex 
          # 移除了無效的 -pdf
          args: -file-line-error -halt-on-error -interaction=nonstopmode -shell-escape
          extra_system_packages: |
            fontconfig
            font-noto-cjk
            py3-pygments

      - name: Commit PDF back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generate PDF"
          file_pattern: "*.pdf"